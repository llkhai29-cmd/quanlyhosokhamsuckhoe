name: Deploy to GitHub Pages

on:
  push:
    branches:
      - "main"
      - "master"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow this job to clone the repo and push changes to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Prevent multiple parallel deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install and Build 🔧
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite output directory
          branch: gh-pages # Target branch for GitHub Pages
